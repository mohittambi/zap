<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zap Platform — Business Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 10.5pt;
    line-height: 1.7;
    color: #111827;
    background: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* Cover page */
  .cover {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 72px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
    color: white;
    page-break-after: always;
  }
  .cover-logo {
    font-size: 13pt;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #a5b4fc;
    margin-bottom: 40px;
  }
  .cover h1 {
    font-size: 42pt;
    font-weight: 700;
    line-height: 1.1;
    color: #fff;
    border: none;
    margin-bottom: 16px;
  }
  .cover-sub {
    font-size: 18pt;
    font-weight: 300;
    color: #c7d2fe;
    margin-bottom: 48px;
  }
  .cover-divider {
    width: 64px;
    height: 4px;
    background: #4f46e5;
    border-radius: 2px;
    margin-bottom: 40px;
  }
  .cover-desc {
    font-size: 11pt;
    color: #a5b4fc;
    line-height: 1.6;
    max-width: 520px;
  }
  .cover-meta {
    margin-top: 60px;
    font-size: 9.5pt;
    color: #6366f1;
    letter-spacing: 0.5px;
  }

  /* TOC page */
  .toc-page {
    padding: 52px 72px;
    page-break-after: always;
  }
  .toc-page h2 {
    font-size: 20pt;
    color: #1a1a2e;
    border-bottom: 3px solid #4f46e5;
    padding-bottom: 10px;
    margin-bottom: 28px;
  }
  .toc-list {
    list-style: none;
    counter-reset: toc-counter;
  }
  .toc-list li {
    counter-increment: toc-counter;
    display: flex;
    align-items: baseline;
    padding: 7px 0;
    border-bottom: 1px dotted #e5e7eb;
    font-size: 11pt;
  }
  .toc-list li::before {
    content: counter(toc-counter, decimal-leading-zero);
    font-size: 9pt;
    font-weight: 600;
    color: #4f46e5;
    min-width: 32px;
  }
  .toc-list .toc-dots {
    flex: 1;
    border-bottom: 1px dotted #d1d5db;
    margin: 0 8px;
    position: relative;
    top: -4px;
  }

  /* Content pages */
  .content {
    padding: 48px 72px;
  }

  /* Section break - full-page section header */
  .section-break {
    page-break-before: always;
  }

  h1 {
    font-size: 24pt;
    font-weight: 700;
    color: #1a1a2e;
    border-bottom: 3px solid #4f46e5;
    padding-bottom: 10px;
    margin-top: 0;
    margin-bottom: 18px;
    line-height: 1.2;
  }

  h2 {
    font-size: 14pt;
    font-weight: 600;
    color: #1e3a8a;
    margin-top: 28px;
    margin-bottom: 10px;
    padding-bottom: 5px;
    border-bottom: 1.5px solid #e5e7eb;
    page-break-after: avoid;
  }

  h3 {
    font-size: 11.5pt;
    font-weight: 600;
    color: #4f46e5;
    margin-top: 20px;
    margin-bottom: 7px;
    page-break-after: avoid;
  }

  h4 {
    font-size: 10.5pt;
    font-weight: 600;
    color: #374151;
    margin-top: 14px;
    margin-bottom: 5px;
  }

  p { margin-bottom: 10px; }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0 18px;
    font-size: 9.5pt;
    page-break-inside: avoid;
  }
  thead tr {
    background-color: #1a1a2e;
    color: #fff;
  }
  thead th {
    padding: 9px 12px;
    text-align: left;
    font-weight: 600;
    letter-spacing: 0.2pt;
  }
  tbody tr { border-bottom: 1px solid #e5e7eb; }
  tbody tr:nth-child(even) { background: #f9fafb; }
  tbody td { padding: 7px 12px; vertical-align: top; }

  /* Code / flow diagrams */
  pre {
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 8.5pt;
    background: #f1f5f9;
    border-left: 4px solid #4f46e5;
    border-radius: 0 5px 5px 0;
    padding: 12px 16px;
    margin: 12px 0 16px;
    white-space: pre;
    page-break-inside: avoid;
    line-height: 1.6;
    color: #1e293b;
    overflow: hidden;
  }
  code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 8.5pt;
    background: #ede9fe;
    color: #4338ca;
    padding: 1px 5px;
    border-radius: 3px;
  }

  /* Blockquotes — real-world examples */
  blockquote {
    margin: 14px 0;
    padding: 12px 18px;
    background: #fffbeb;
    border-left: 5px solid #f59e0b;
    border-radius: 0 5px 5px 0;
    color: #78350f;
    font-style: italic;
    page-break-inside: avoid;
  }
  blockquote p { margin: 0; }
  blockquote strong { color: #92400e; }

  /* Lists */
  ul, ol {
    margin: 7px 0 12px 22px;
    padding: 0;
  }
  li { margin-bottom: 5px; }

  hr {
    border: none;
    border-top: 2px solid #e5e7eb;
    margin: 22px 0;
  }

  strong { font-weight: 600; color: #1a1a2e; }

  /* Print rules */
  @media print {
    h1 { page-break-before: always; }
    .cover { page-break-before: avoid; }
    .cover h1 { page-break-before: avoid; }
  }

  /* Footer strip */
  .page-footer {
    display: none;
  }
</style>
</head>
<body>
$body$
</body>
</html>
